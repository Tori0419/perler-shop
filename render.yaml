services:
  - type: web
    name: perler-shop
    runtime: docker
    plan: starter
    region: oregon
    branch: master
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /login
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_KEY
        sync: false
      - key: SHOP_DATA_DIR
        value: /var/data/data
      - key: SHOP_UPLOAD_DIR
        value: /var/data/uploads/products
      - key: SHOP_UPLOAD_PUBLIC_PREFIX
        value: /uploads/products
    disk:
      name: perler-shop-disk
      mountPath: /var/data
      sizeGB: 1
