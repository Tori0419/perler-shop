services:
  - type: web
    name: perler-shop
    runtime: docker
    plan: free
    region: oregon
    branch: master
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /_health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: DEMO_RESET_ON_BOOT
        value: "true"
      - key: SHOP_DATA_DIR
        value: storage/app/data
      - key: SHOP_UPLOAD_DIR
        value: public/images/uploads/products
      - key: SHOP_UPLOAD_PUBLIC_PREFIX
        value: /images/uploads/products
